                    <span id="nowPlayingTrackName" style="color: white; font-weight: bold; font-size: 16px;">Track Name</span>

                <div style="display: flex; flex-direction: column; align-items: center; flex: 2; margin: 10px 15px; min-width: 300px;">

                    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
                        <button class="btn-small" onclick="app.prevTrack()" style="padding: 2px 8px; border-color: rgba(255,255,255,0.3);" title="Previous Track">⏮</button>
