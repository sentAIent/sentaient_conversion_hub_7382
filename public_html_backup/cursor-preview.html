        body {

                    <g transform="translate(37,36.5) scale(0.203)" stroke="white" stroke-width="4" fill="none"

                        <path
                            d="M64 24 C64 24 84 50 84 72 C84 85 75 92 64 92 C53 92 44 85 44 72 C44 50 64 24 64 24 Z" />

                        <path d="M44 72 C30 76 20 64 20 52 C20 40 36 30 36 30" />
                        <path d="M84 72 C98 76 108 64 108 52 C108 40 92 30 92 30" />
                        <path d="M48 96 L64 108 L80 96" />
                    </g>
