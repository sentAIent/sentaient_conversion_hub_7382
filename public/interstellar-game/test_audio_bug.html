<!DOCTYPE html>
<html>
<body>
<button onclick="init()">Init</button>
<input type="range" min="0" max="1" step="0.05" value="0.15" oninput="setVol(this.value)">
<script>
let ctx;
let gain;
function init() {
    ctx = new AudioContext();
    gain = ctx.createGain();
    gain.connect(ctx.destination);
    
    let osc = ctx.createOscillator();
    osc.connect(gain);
    osc.start();
}
function setVol(val) {
    try {
        gain.gain.setValueAtTime(parseFloat(val), ctx.currentTime);
        console.log("Success", val);
    } catch(e) {
        console.error(e);
    }
}
</script>
</body>
</html>
